version: '3.8'

services:
  web:
    build: ./backend
    container_name: movly_django
    volumes:
      - ./backend:/app
    env_file:
      - ./backend/.env
    ports:
      - "8000:8000"
    depends_on:
      - redis

  nginx:
    image: nginx:latest
    container_name: movly_nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf
      - ./backend/staticfiles:/app/staticfiles
    depends_on:
      - web

  redis:
    image: redis:alpine
    container_name: movly_redis
