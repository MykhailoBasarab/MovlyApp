{% extends 'base.html' %}

{% block title %}Пароль змінено — MOVLY{% endblock %}

{% block content %}
<div class="auth-page">
    <div class="form-container">
        <h2>Пароль змінено</h2>
        <div style="text-align: center; margin-bottom: 2rem;">
            <i class="fas fa-check-circle"
                style="font-size: 3rem; color: var(--success-color); margin-bottom: 1rem; display: block;"></i>
            <p>Ваш новий пароль успішно встановлено. Тепер ви можете увійти в систему за допомогою нового пароля.</p>
        </div>
        <a href="{% url 'users:login' %}" class="btn-hero-primary"
            style="width: 100%; display: block; text-align: center; text-decoration: none; border: none;">Увійти</a>
    </div>
</div>
{% endblock %}
