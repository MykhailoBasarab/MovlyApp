{% extends 'base.html' %}

{% block title %}Пароль змінено — MOVLY{% endblock %}

{% block content %}
<div class="auth-page">
    <div class="form-container-premium text-center" data-sa="fade-up">
        <div class="form-header">
            <div style="width: 100px; height: 100px; background: rgba(16, 185, 129, 0.05); border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 2.5rem; border: 1px solid rgba(16, 185, 129, 0.1);">
                <i class="fas fa-check-circle" style="font-size: 2.5rem; color: #10b981;"></i>
            </div>
            <h2 style="margin-bottom: 1rem; font-family: var(--font-accent); font-weight: 850; font-size: 2.2rem; letter-spacing: -0.04em;">Пароль змінено</h2>
            <p style="color: #64748b; font-weight: 500; line-height: 1.6; max-width: 400px; margin: 0 auto;">
                Ваш новий пароль успішно встановлено. Тепер ви можете увійти в систему за допомогою нових облікових даних.
            </p>
        </div>

        <a href="{% url 'users:login' %}" class="btn-hero-primary-modern" style="width: 100%; justify-content: center; text-decoration: none;">
            Увійти в акаунт
        </a>
    </div>
</div>

<style>
    .form-container-premium {
        width: 100%;
        max-width: 500px;
        background: white;
        padding: 4.5rem 3.5rem;
        border-radius: 40px;
        border: 1px solid rgba(0,0,0,0.04);
        box-shadow: 0 25px 60px rgba(0,0,0,0.05);
        position: relative;
        overflow: hidden;
    }

    .form-header { text-align: center; margin-bottom: 3rem; }

    .btn-hero-primary-modern {
        display: inline-flex;
        align-items: center;
        background: linear-gradient(135deg, var(--accent) 0%, #4f46e5 100%);
        color: white !important;
        padding: 20px 45px;
        border-radius: 24px;
        font-weight: 850;
        text-decoration: none !important;
        transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        box-shadow: 0 10px 25px rgba(99, 102, 241, 0.25);
        border: none;
        cursor: pointer;
        text-transform: uppercase;
        letter-spacing: 0.05em;
        font-size: 1rem;
        font-family: var(--font-accent);
    }
    .btn-hero-primary-modern:hover { transform: translateY(-5px) scale(1.02); box-shadow: 0 20px 40px rgba(99, 102, 241, 0.35); }
</style>
{% endblock %}
